<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蜃灵助手 · 幻境织锦风格演示</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Cinzel:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select{font-family:inherit}

[data-theme="dark"]{
  --bg: #04070f;
  --panel: rgba(9,14,30,0.92);
  --card: rgba(255,255,255,0.04);
  --card-h: rgba(255,255,255,0.07);
  --border: rgba(106,196,216,0.15);
  --border-h: rgba(106,196,216,0.3);
  --text: rgba(218,238,248,0.95);
  --sub: rgba(148,198,222,0.65);
  --muted: rgba(106,160,190,0.5);
  --accent: #6ac4d8;
  --a: #7b5ea7; --b: #3ecfbf; --c: #e87b9a;
  --btn-from: #6b4fa0; --btn-to: #2fb8a8;
  --input-bg: rgba(6,12,26,0.7);
  --nav-bg: rgba(6,10,22,0.65);
  --nav-active-bg: rgba(106,196,216,0.09);
  --nav-active-border: #6ac4d8;
  --shadow: 0 24px 72px rgba(0,0,0,0.65);
  --toggle-off: rgba(106,196,216,0.15);
}
[data-theme="light"]{
  --bg: #ece7de;
  --panel: rgba(252,247,242,0.97);
  --card: rgba(155,106,78,0.07);
  --card-h: rgba(155,106,78,0.12);
  --border: rgba(155,106,78,0.18);
  --border-h: rgba(155,106,78,0.35);
  --text: rgba(48,28,18,0.95);
  --sub: rgba(88,58,38,0.7);
  --muted: rgba(130,96,72,0.55);
  --accent: #7a5038;
  --a: #c4875a; --b: #6a9e8a; --c: #a05060;
  --btn-from: #9b6a4e; --btn-to: #6a9e8a;
  --input-bg: rgba(255,252,248,0.9);
  --nav-bg: rgba(240,232,222,0.7);
  --nav-active-bg: rgba(155,106,78,0.1);
  --nav-active-border: #9b6a4e;
  --shadow: 0 20px 56px rgba(80,48,28,0.2);
  --toggle-off: rgba(155,106,78,0.18);
}

html,body{
  width:100%;min-height:100%;
  font-family:'Noto Sans SC',sans-serif;
  font-size:14px;
  background:var(--bg);
  color:var(--text);
  display:flex;flex-direction:column;align-items:center;
  padding:40px 20px 60px;
  gap:32px;
  transition:background 0.3s,color 0.3s;
}

/* Aurora layer (dark only) */
.aurora{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
[data-theme="light"] .aurora{opacity:0}
.orb{position:absolute;border-radius:50%;filter:blur(90px);mix-blend-mode:screen}
.orb-1{width:500px;height:500px;top:-150px;left:-100px;background:radial-gradient(circle,rgba(123,94,167,.5) 0%,transparent 70%);animation:drift 14s ease-in-out infinite alternate}
.orb-2{width:420px;height:420px;top:50%;right:-80px;background:radial-gradient(circle,rgba(62,207,191,.4) 0%,transparent 70%);animation:drift2 18s ease-in-out infinite alternate}
.orb-3{width:350px;height:350px;bottom:-80px;left:35%;background:radial-gradient(circle,rgba(232,123,154,.3) 0%,transparent 70%);animation:drift 22s ease-in-out infinite alternate-reverse}
@keyframes drift{to{transform:translate(50px,30px) scale(1.08)}}
@keyframes drift2{to{transform:translate(-40px,-30px) scale(.92)}}

/* Top bar */
.topbar{
  position:relative;z-index:10;
  width:100%;max-width:760px;
  display:flex;align-items:center;justify-content:space-between;
}
.topbar-title{
  font-family:'ZCOOL XiaoWei',serif;
  font-size:20px;letter-spacing:.06em;
  color:var(--text);
}
.topbar-sub{
  font-family:'Cinzel',serif;
  font-size:10px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--muted);margin-top:2px;
}
.theme-btn{
  padding:7px 16px;border-radius:99px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--sub);
  font-size:12px;letter-spacing:.04em;
  backdrop-filter:blur(8px);
  transition:all .2s;
}
.theme-btn:hover{border-color:var(--border-h);color:var(--accent)}

/* Section label */
.section-label{
  position:relative;z-index:1;
  width:100%;max-width:760px;
  font-family:'Cinzel',serif;
  font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--muted);
  display:flex;align-items:center;gap:12px;
}
.section-label::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(to right,var(--border),transparent);
}

/* Demo row */
.demo-row{
  position:relative;z-index:1;
  width:100%;max-width:760px;
  display:flex;gap:12px;flex-wrap:wrap;
}

/* ── PANEL SHELL PREVIEW ── */
.panel-preview{
  width:100%;max-width:760px;
  position:relative;z-index:1;
  border-radius:18px;
  border:1px solid var(--border);
  background:var(--panel);
  backdrop-filter:blur(24px) saturate(160%);
  box-shadow:var(--shadow);
  overflow:hidden;
}
[data-theme="dark"] .panel-preview::before{
  content:'';position:absolute;
  top:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(106,196,216,.45) 30%,rgba(123,94,167,.35) 70%,transparent);
  pointer-events:none;z-index:10;
}

/* Panel header */
.ph{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;height:54px;
  border-bottom:1px solid var(--border);
}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{font-size:22px;filter:drop-shadow(0 0 8px rgba(106,196,216,.6));animation:float 4s ease-in-out infinite}
@keyframes float{50%{transform:translateY(-2px)}}
.brand-name{font-family:'ZCOOL XiaoWei',serif;font-size:17px;letter-spacing:.04em;color:var(--text)}
.brand-sub{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.ph-actions{display:flex;gap:4px}
.ph-btn{
  width:30px;height:30px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--sub);
  border:1px solid transparent;
  transition:all .18s;position:relative;
}
.ph-btn:hover{background:var(--card-h);border-color:var(--border);color:var(--accent)}
.ph-btn.alert::after{content:'';position:absolute;top:5px;right:5px;width:6px;height:6px;border-radius:50%;background:var(--c);box-shadow:0 0 5px var(--c)}

/* Panel body */
.pb{display:flex;height:340px}

/* Nav column */
.nav-col{
  width:186px;flex-shrink:0;
  background:var(--nav-bg);
  border-right:1px solid var(--border);
  padding:8px;display:flex;flex-direction:column;gap:1px;
  overflow:hidden;
}
.nav-sec{
  font-family:'Cinzel',serif;font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);padding:7px 8px 3px;
}
.nav-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 8px;border-radius:8px;
  border:1px solid transparent;border-left:3px solid transparent;
  cursor:pointer;transition:all .18s;
  color:var(--sub);background:transparent;width:100%;text-align:left;
}
.nav-item:hover{background:var(--card-h);color:var(--text)}
.nav-item.on{
  background:var(--nav-active-bg);
  border-left-color:var(--nav-active-border);
  color:var(--text);
}
[data-theme="dark"] .nav-item.on{box-shadow:inset 0 0 14px rgba(106,196,216,.12)}
.ni-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.ni-lbl{font-size:13px;font-weight:400}
.nav-item.on .ni-lbl{font-weight:500}
.nav-div{height:1px;background:var(--border);margin:5px 4px}
.nav-badge{
  margin-left:auto;font-size:9.5px;padding:1px 6px;border-radius:99px;
  background:rgba(62,207,191,.15);color:#3ecfbf;
  font-family:'Cinzel',serif;
}

/* Detail col */
.detail-col{flex:1;padding:14px;overflow:auto;display:flex;flex-direction:column;gap:10px}
.detail-col::-webkit-scrollbar{width:3px}
.detail-col::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── CARDS ── */
.card{
  border-radius:12px;border:1px solid var(--border);
  background:var(--card);
  backdrop-filter:blur(10px);
  padding:14px 16px;
  transition:background .2s,border-color .2s;
}
.card:hover{background:var(--card-h);border-color:var(--border-h)}
.card.dim{background:rgba(0,0,0,.06);border-color:transparent;opacity:.7}
[data-theme="dark"] .card.dim{background:rgba(255,255,255,.02)}
.card-ttl{
  font-family:'Cinzel',serif;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--accent);margin-bottom:10px;
  display:flex;align-items:center;gap:6px;
}
.card-ttl::before{
  content:'';display:inline-block;width:3px;height:11px;border-radius:2px;flex-shrink:0;
  background:linear-gradient(to bottom,var(--btn-from),var(--btn-to));
}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:7px 15px;border-radius:8px;
  font-size:12.5px;font-weight:500;letter-spacing:.02em;
  cursor:pointer;transition:all .18s;border:none;
  font-family:'Noto Sans SC',sans-serif;
}
.btn-p{
  background:linear-gradient(135deg,var(--btn-from),var(--btn-to));
  color:#fff;
  box-shadow:0 4px 14px rgba(62,207,191,.2);
}
.btn-p:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 6px 18px rgba(62,207,191,.3)}
.btn-s{
  background:rgba(106,196,216,.1);color:var(--accent);
  border:1px solid rgba(106,196,216,.25);
}
[data-theme="light"] .btn-s{background:rgba(155,106,78,.1);color:var(--accent);border-color:rgba(155,106,78,.28)}
.btn-s:hover{background:rgba(106,196,216,.2)}
.btn-g{
  background:transparent;color:var(--muted);
  border:1px solid var(--border);
}
.btn-g:hover{border-color:var(--c);color:var(--c)}

/* ── TOGGLE ── */
.tog{position:relative;width:40px;height:22px;flex-shrink:0;cursor:pointer}
.tog input{opacity:0;width:0;height:0}
.tog-track{
  position:absolute;inset:0;border-radius:99px;
  background:var(--toggle-off);border:1px solid var(--border);
  transition:all .22s;
}
.tog input:checked~.tog-track{
  background:linear-gradient(90deg,var(--btn-from),var(--btn-to));
  border-color:transparent;box-shadow:0 0 10px rgba(62,207,191,.28);
}
.tog-knob{
  position:absolute;top:3px;left:3px;
  width:16px;height:16px;border-radius:50%;
  background:#fff;transition:transform .22s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 1px 4px rgba(0,0,0,.2);
}
.tog input:checked~.tog-knob{transform:translateX(18px)}

/* ── INPUT / SELECT ── */
.inp{
  width:100%;background:var(--input-bg);
  border:1px solid var(--border);border-radius:8px;
  padding:7px 10px;font-size:12.5px;color:var(--text);
  outline:none;transition:border .18s,box-shadow .18s;
  font-family:'Noto Sans SC',sans-serif;
}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(106,196,216,.1)}
[data-theme="light"] .inp:focus{box-shadow:0 0 0 3px rgba(155,106,78,.1)}

/* Chip */
.chip{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 9px;border-radius:99px;font-size:11px;
  background:rgba(62,207,191,.12);color:#3ecfbf;
  border:1px solid rgba(62,207,191,.22);
}
[data-theme="light"] .chip{background:rgba(106,158,138,.1);color:#4a7d6a;border-color:rgba(106,158,138,.22)}
.chip-dot{width:6px;height:6px;border-radius:50%;background:currentColor;box-shadow:0 0 5px currentColor;animation:pd 2s ease-in-out infinite}
@keyframes pd{50%{opacity:.4}}

/* FAB preview */
.fab{
  width:48px;height:48px;border-radius:50%;
  background:linear-gradient(135deg,var(--btn-from),var(--btn-to));
  box-shadow:0 10px 30px rgba(123,94,167,.4),0 0 0 5px rgba(62,207,191,.08);
  display:flex;align-items:center;justify-content:center;font-size:22px;
  cursor:pointer;border:none;
  animation:breathe 4s ease-in-out infinite;
  transition:transform .2s;
}
.fab:hover{transform:scale(1.08)}
@keyframes breathe{50%{box-shadow:0 14px 38px rgba(123,94,167,.5),0 0 0 8px rgba(62,207,191,.1)}}

/* Aurora halo behind panel */
[data-theme="dark"] .panel-halo{
  position:relative;
}
[data-theme="dark"] .panel-halo::before{
  content:'';position:absolute;inset:-30px;
  background:conic-gradient(from 180deg at 30% 40%,rgba(123,94,167,.15) 0deg,rgba(62,207,191,.12) 120deg,rgba(232,123,154,.08) 220deg,rgba(123,94,167,.15) 360deg);
  border-radius:28px;filter:blur(24px);
  animation:halo 18s linear infinite;pointer-events:none;
}
@keyframes halo{to{transform:rotate(360deg)}}

.row-between{display:flex;align-items:center;justify-content:space-between;gap:10px}
.mt10{margin-top:10px}
</style>
</head>
<body>

<div class="aurora">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<!-- Top bar -->
<div class="topbar">
  <div>
    <div class="topbar-title">🫧 蜃灵助手</div>
    <div class="topbar-sub">幻境织锦 · 风格演示</div>
  </div>
  <button class="theme-btn" id="themeBtn">切换 浅色 / 暗色</button>
</div>

<!-- Panel Shell -->
<div class="section-label">面板外壳 · 导航与布局</div>
<div class="panel-halo" style="width:100%;max-width:760px;position:relative;z-index:1">
<div class="panel-preview">
  <div class="ph">
    <div class="brand">
      <span class="brand-icon">🫧</span>
      <div>
        <div class="brand-name">蜃灵助手</div>
        <div class="brand-sub">ShenLing Extension</div>
      </div>
    </div>
    <div class="ph-actions">
      <button class="ph-btn alert" title="通讯日志">📡</button>
      <button class="ph-btn" title="主题">☀️</button>
      <button class="ph-btn" title="关闭">✕</button>
    </div>
  </div>
  <div class="pb">
    <nav class="nav-col">
      <div class="nav-sec">功能模块</div>
      <button class="nav-item on">
        <span class="ni-icon">🎯</span><span class="ni-lbl">自动总结</span>
        <span class="nav-badge">ON</span>
      </button>
      <button class="nav-item">
        <span class="ni-icon">🎭</span><span class="ni-lbl">情感档案</span>
      </button>
      <button class="nav-item">
        <span class="ni-icon">✴️</span><span class="ni-lbl">剧情规划</span>
      </button>
      <button class="nav-item">
        <span class="ni-icon">📚</span><span class="ni-lbl">回忆录世界书</span>
      </button>
      <button class="nav-item">
        <span class="ni-icon">💕</span><span class="ni-lbl">逆攻略</span>
      </button>
      <div class="nav-div"></div>
      <div class="nav-sec">创作工具</div>
      <button class="nav-item">
        <span class="ni-icon">🌈</span><span class="ni-lbl">平行事件</span>
      </button>
      <button class="nav-item">
        <span class="ni-icon">📒</span><span class="ni-lbl">日程日记</span>
      </button>
      <button class="nav-item">
        <span class="ni-icon">✨</span><span class="ni-lbl">灵感工具</span>
      </button>
      <div class="nav-div"></div>
      <div class="nav-sec">系统</div>
      <button class="nav-item">
        <span class="ni-icon">🔄</span><span class="ni-lbl">词汇替换</span>
      </button>
      <button class="nav-item">
        <span class="ni-icon">⚙️</span><span class="ni-lbl">设置</span>
      </button>
    </nav>
    <div class="detail-col">
      <div class="card">
        <div class="card-ttl">卡片样例</div>
        <div class="row-between">
          <div>
            <div style="font-size:13.5px;font-weight:500;color:var(--text)">自动小总结</div>
            <div style="font-size:11.5px;color:var(--muted);margin-top:2px">AI 回复后自动生成 &lt;memory&gt;</div>
          </div>
          <label class="tog">
            <input type="checkbox" checked>
            <div class="tog-track"></div>
            <div class="tog-knob"></div>
          </label>
        </div>
        <div class="mt10" style="display:flex;align-items:center;justify-content:space-between">
          <div style="font-size:12px;color:var(--muted)">已累计 <span style="color:var(--accent);font-weight:600">5</span> / 8 条</div>
          <div class="chip"><span class="chip-dot"></span> 监听中</div>
        </div>
      </div>
      <div class="card dim">
        <div class="card-ttl">归档状态</div>
        <div style="display:flex;flex-direction:column;gap:5px">
          <div style="display:flex;justify-content:space-between;font-size:12px">
            <span style="color:var(--muted)">小总结</span><b>47 条</b>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:12px">
            <span style="color:var(--muted)">大总结</span><b>6 次</b>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</div>

<!-- Buttons -->
<div class="section-label">按钮层级</div>
<div class="demo-row" style="position:relative;z-index:1">
  <button class="btn btn-p">保存配置</button>
  <button class="btn btn-p">生成总结</button>
  <button class="btn btn-s">拉取模型</button>
  <button class="btn btn-s">重新生成</button>
  <button class="btn btn-g">删除档案</button>
  <button class="btn btn-g">清空日志</button>
</div>

<!-- Cards -->
<div class="section-label">卡片材质</div>
<div class="demo-row" style="position:relative;z-index:1">
  <div class="card" style="flex:1;min-width:200px">
    <div class="card-ttl">标准卡片</div>
    <div style="font-size:12.5px;color:var(--sub);line-height:1.6">
      磨砂玻璃材质，hover 时背景加深、边框高亮。
    </div>
    <input class="inp mt10" placeholder="输入框样式">
  </div>
  <div class="card dim" style="flex:1;min-width:200px">
    <div class="card-ttl">弱化卡片</div>
    <div style="font-size:12.5px;color:var(--muted);line-height:1.6">
      用于只读的诊断信息、状态快照等次要内容。
    </div>
  </div>
  <div style="display:flex;flex-direction:column;gap:10px;flex:1;min-width:180px">
    <div class="chip" style="align-self:flex-start"><span class="chip-dot"></span> 监听中</div>
    <div style="display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:99px;font-size:11.5px;background:rgba(232,123,154,.1);color:var(--c);border:1px solid rgba(232,123,154,.22)">
      ● 2 条失败
    </div>
    <button class="fab" style="align-self:flex-start"></button>
  </div>
</div>

<script>
document.getElementById('themeBtn').addEventListener('click',()=>{
  const html=document.documentElement;
  html.dataset.theme=html.dataset.theme==='dark'?'light':'dark';
});
// Nav click highlight
document.querySelectorAll('.nav-item').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
  });
});
</script>
</body>
</html>
